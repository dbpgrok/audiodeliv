<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paiement annulé – audiodeliv</title>
  <link rel="preconnect" href="https://api.fontshare.com" />
  <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400;500;700;800&f[]=satoshi@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #08080e;
      --bg-card: #16161f;
      --gold: #d4a843;
      --gold-light: #e8c76a;
      --gold-dim: #a17e2e;
      --text-primary: #f0ece4;
      --text-secondary: #9a968e;
      --text-muted: #5e5b55;
      --amber-dim: rgba(212, 168, 67, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
      --font-display: 'Cabinet Grotesk', Arial, sans-serif;
      --font-body: 'Satoshi', Arial, sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 50% 30%, rgba(212, 168, 67, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      background: var(--bg-card);
      border: 1px solid rgba(212, 168, 67, 0.1);
      border-radius: var(--radius);
      padding: 48px 40px;
      max-width: 480px;
      width: 90%;
      text-align: center;
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--amber-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .icon-circle svg {
      width: 32px;
      height: 32px;
      color: var(--gold);
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      color: var(--text-primary);
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold), var(--gold-dim));
      color: #0a0a0f;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      box-shadow: 0 4px 20px rgba(212, 168, 67, 0.25);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .help-text {
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .help-text a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .help-text a:hover {
      color: var(--gold);
    }

    .logo-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-top: 24px;
      transition: color 0.2s;
    }

    .logo-link:hover {
      color: var(--text-secondary);
    }

    .logo-link svg {
      width: 20px;
      height: 20px;
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon-circle">
      <svg viewBox="0 0 36 36" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
        <line x1="12" y1="12" x2="24" y2="24"/>
        <line x1="24" y1="12" x2="12" y2="24"/>
      </svg>
    </div>

    <h1>Paiement annulé</h1>
    <p class="subtitle">
      Votre commande n'a pas été finalisée.<br/>
      Aucun montant n'a été débité.
    </p>

    <a href="/" class="btn btn-primary">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M6.5 2L1 8l5.5 6M2 8h13"/></svg>
      Retour à la boutique
    </a>

    <p class="help-text">
      Un souci ? Vous pouvez retenter l'achat à tout moment.
    </p>

    <div>
      <a href="/" class="logo-link">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="32" height="32" rx="8" stroke="currentColor" stroke-width="2"/>
          <path d="M12 24V14l12-2v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="12" cy="24" r="3" fill="currentColor" opacity="0.5"/>
          <circle cx="24" cy="22" r="3" fill="currentColor" opacity="0.5"/>
        </svg>
        audiodeliv
      </a>
    </div>
  </div>

</body>
</html>
